name: Build Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: HelloWorld
            nuitka-cache: linux-nuitka-cache
          - os: macos-latest
            artifact: HelloWorld
            nuitka-cache: macos-nuitka-cache
          - os: windows-latest
            artifact: HelloWorld.exe
            nuitka-cache: windows-nuitka-cache

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nuitka and dependencies
        run: pip install nuitka ordered-set

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/.cache/nuitka
          key: ${{ matrix.nuitka-cache }}-${{ hashFiles('src/main.py') }}
          restore-keys: ${{ matrix.nuitka-cache }}-

      - name: Build with Nuitka
        run: python -m nuitka --standalone --onefile --output-filename=${{ matrix.artifact }} src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.os }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release files
        run: |
          mkdir -p release
          cp artifacts/HelloWorld-ubuntu-latest/HelloWorld release/HelloWorld-linux
          cp artifacts/HelloWorld-macos-latest/HelloWorld release/HelloWorld-macos
          cp artifacts/HelloWorld-windows-latest/HelloWorld.exe release/HelloWorld.exe
          chmod +x release/HelloWorld-linux release/HelloWorld-macos

      - name: Generate release body
        id: body
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          # --- Download Table ---
          DOWNLOADS=$(cat <<'EOF'
          | Platform | File | Arch |
          |----------|------|------|
          | Linux | [HelloWorld-linux](../blob/main/release/HelloWorld-linux?raw=true) | x86_64 |
          | macOS | [HelloWorld-macos](../blob/main/release/HelloWorld-macos?raw=true) | Universal |
          | Windows | [HelloWorld.exe](../blob/main/release/HelloWorld.exe?raw=true) | x86_64 |
          EOF
          )

          # --- Changelog ---
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..${TAG} --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log ${TAG} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # --- Contributors ---
          CONTRIBUTORS=$(git log ${TAG} --pretty=format:"- %an" --no-merges | sort -u)

          # --- Assemble ---
          cat <<BODY > release_notes.md
          ## What's Changed

          ${CHANGELOG}

          ## Download

          ${DOWNLOADS}

          ## Contributors

          ${CONTRIBUTORS}
          BODY

          # Strip leading spaces from heredoc indentation
          sed -i 's/^          //' release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            release/HelloWorld-linux
            release/HelloWorld-macos
            release/HelloWorld.exe
